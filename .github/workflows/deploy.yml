name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Trigger Render Dev Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Prod Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}